{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <div class="card shadow border-0 mx-auto" style="max-width: 400px;">
        <div class="card-body p-4">
            <h4>Set New Password</h4>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-success w-100">Update Password</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
