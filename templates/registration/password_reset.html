{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <div class="card shadow border-0 mx-auto" style="max-width: 400px;">
        <div class="card-body p-4">
            <h4 class="fw-bold text-center">Reset Password</h4>
            <p class="text-muted small text-center">Enter your email and we'll send you instructions.</p>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100">Send Reset Email</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
